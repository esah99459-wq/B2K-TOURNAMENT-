<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>B2K Admin Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #171821; color: #fff; padding: 20px; font-family: sans-serif; }
        .box { background: #21222d; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2f3042; }
        button { background: #ff4e50; color: #fff; border: none; padding: 10px; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>B2K অ্যাডমিন ড্যাশবোর্ড</h1>

    <div class="box">
        <h2>ডিপোজিট রিকোয়েস্ট</h2>
        <div id="depositList">লোড হচ্ছে...</div>
    </div>

    <div class="box">
        <h2>উইথড্র রিকোয়েস্ট</h2>
        <div id="withdrawList">লোড হচ্ছে...</div>
    </div>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ডিপোজিট রিকোয়েস্ট লোড ও এপ্রুভ
        database.ref('requests/deposits').on('value', snapshot => {
            const list = document.getElementById('depositList');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const d = child.val();
                list.innerHTML += `<div style="border-bottom:1px solid #444; padding:10px;">
                    UID: ${d.uid} | Amount: ${d.amount} | TID: ${d.tid} 
                    <button onclick="approveDeposit('${child.key}', '${d.uid}', ${d.amount})">এপ্রুভ করুন</button>
                </div>`;
            });
        });

        function approveDeposit(key, uid, amount) {
            database.ref('users/' + uid + '/balance').once('value', s => {
                const current = s.val().balance || 0;
                database.ref('users/' + uid + '/balance').set(current + amount);
                database.ref('requests/deposits/' + key).remove();
                alert("ব্যালেন্স আপডেট হয়েছে!");
            });
        }

        // উইথড্র রিকোয়েস্ট লোড ও ডিলিট (পেমেন্ট করার পর)
        database.ref('requests/withdrawals').on('value', snapshot => {
            const list = document.getElementById('withdrawList');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const w = child.val();
                list.innerHTML += `<div style="border-bottom:1px solid #444; padding:10px;">
                    UID: ${w.uid} | ${w.method} | ${w.number} | ${w.amount} TK 
                    <button onclick="database.ref('requests/withdrawals/${child.key}').remove()">পেমেন্ট হয়েছে (Delete)</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
