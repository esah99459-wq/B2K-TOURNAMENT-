<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B2K Admin Panel - Full Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #12131a; color: #fff; padding: 20px; }
        #passwordScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #12131a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .panel-box { background: #1c1d26; padding: 20px; border-radius: 12px; border: 1px solid #2d2f3d; margin-bottom: 20px; }
        h2 { color: #ffbc00; font-size: 18px; margin-bottom: 15px; border-left: 4px solid #ff4e50; padding-left: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #12131a; color: #fff; border: 1px solid #2d2f3d; border-radius: 5px; }
        .btn { width: 100%; padding: 10px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; background: #ff4e50; color: #fff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="passwordScreen">
        <div class="panel-box" style="text-align:center;">
            <h3>Admin Access</h3>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button class="btn" onclick="checkAdmin()">Login</button>
        </div>
    </div>

    <div id="adminContent" style="display:none;">
        <h1>B2K Admin Control Panel</h1>

        <div class="panel-box">
            <h2>খেলার নিয়মাবলী আপডেট</h2>
            <textarea id="rulesText" rows="5" placeholder="এখানে খেলার নতুন নিয়মাবলী লিখুন..."></textarea>
            <button class="btn" style="background: #9b59b6;" onclick="updateRules()">নিয়মাবলী পাবলিশ করুন</button>
        </div>

        <div class="panel-box">
            <h2>লাভ ক্যালকুলেটর</h2>
            <input type="number" id="players" placeholder="প্লেয়ার সংখ্যা">
            <input type="number" id="fee" placeholder="এন্ট্রি ফি">
            <input type="number" id="prize" placeholder="প্রাইজ মানি">
            <button class="btn" style="background: green;" onclick="calculate()">হিসাব করুন</button>
            <div id="output" style="margin-top:10px; font-weight:bold;"></div>
        </div>

        <div class="panel-box">
            <h2>নোটিশ ও লিংক আপডেট (থাম্বনেল সিস্টেম)</h2>
            <input type="text" id="noticeText" placeholder="নোটিশের শিরোনাম লিখুন">
            <input type="text" id="noticeLink" placeholder="লিংক বসান (যেমন: ভিডিও বা ইমেজ লিংক)">
            <button class="btn" style="background: #3498db;" onclick="updateNotice()">পাবলিশ করুন</button>
        </div>

        <div class="panel-box">
            <h2>ডিপোজিট রিকোয়েস্ট (এক ক্লিকে এপ্রুভ)</h2>
            <div id="depositList"></div>
        </div>

        <div class="panel-box">
            <h2>ম্যাচ ম্যানেজমেন্ট</h2>
            <input type="text" id="matchId" placeholder="Match Unique Key (যেমন: match01)">
            <input type="text" id="gameMode" placeholder="মুড (Solo/Duo/Squad)">
            <input type="text" id="roomId" placeholder="Room ID">
            <input type="text" id="roomPass" placeholder="Room Password">
            <button class="btn" onclick="createOrUpdateMatch()">সেভ বা আপডেট করুন</button>
        </div>

        <div class="panel-box">
            <h2>লিডারবোর্ড আপডেট</h2>
            <input type="text" id="winnerUid" placeholder="Winner UID">
            <input type="number" id="winPoints" placeholder="পয়েন্ট">
            <button class="btn" onclick="updateLeaderboard()">আপডেট করুন</button>
        </div>

        <div class="panel-box">
            <h2>উইথড্র রিকোয়েস্ট</h2>
            <div id="withdrawList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ বসান */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAdmin() {
            if (document.getElementById('adminPass').value === "17510") {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        // ক্যালকুলেটর ফাংশন
        function calculate() {
            let res = (document.getElementById('players').value * document.getElementById('fee').value) - document.getElementById('prize').value;
            document.getElementById('output').innerHTML = "Profit: " + res + " TK";
        }

        // নিয়মাবলী আপডেট ফাংশন
        function updateRules() {
            const rules = document.getElementById('rulesText').value;
            database.ref('app_settings/rules').set(rules)
            .then(() => alert("নিয়মাবলী সফলভাবে আপডেট হয়েছে!"));
        }

        // নোটিশ আপডেট ফাংশন
        function updateNotice() {
            database.ref('app_settings/notice').set({
                text: document.getElementById('noticeText').value,
                link: document.getElementById('noticeLink').value
            }).then(() => alert("নোটিশ এবং লিংক আপডেট হয়েছে!"));
        }

        // ডিপোজিট রিকোয়েস্ট লজিক
        database.ref('requests/deposits').on('value', snapshot => {
            const container = document.getElementById('depositList');
            container.innerHTML = "";
            snapshot.forEach(child => {
                const req = child.val();
                container.innerHTML += `<div style="background:#12131a; padding:10px; border-bottom:1px solid #2d2f3d; margin-bottom:5px;">
                    User: ${req.email} <br> 
                    নম্বর: ${req.number} | ট্রানজেকশন আইডি: ${req.tid} | টাকা: ${req.amount} <br>
                    <button class="btn" style="background:#2ecc71; margin-top:5px;" 
                    onclick="approveDeposit('${child.key}', '${req.uid}', ${req.amount})">Approve</button>
                </div>`;
            });
        });

        function approveDeposit(reqKey, uid, amount) {
            database.ref('users/' + uid + '/balance').transaction(c => (c || 0) + amount)
            .then(() => {
                database.ref('requests/deposits/' + reqKey).remove();
                alert("ব্যালেন্স এপ্রুভ হয়েছে!");
            });
        }

        function createOrUpdateMatch() {
            const key = document.getElementById('matchId').value;
            database.ref('matches/' + key).set({
                gameMode: document.getElementById('gameMode').value,
                roomId: document.getElementById('roomId').value,
                roomPassword: document.getElementById('roomPass').value
            }).then(() => alert("ম্যাচ আপডেট হয়েছে!"));
        }

        function updateLeaderboard() {
            const uid = document.getElementById('winnerUid').value;
            const pts = parseInt(document.getElementById('winPoints').value);
            database.ref('leaderboard/' + uid + '/points').transaction(c => (c || 0) + pts)
            .then(() => alert("পয়েন্ট আপডেট হয়েছে!"));
        }

        database.ref('requests/withdrawals').on('value', snapshot => {
            const container = document.getElementById('withdrawList');
            container.innerHTML = "";
            snapshot.forEach(child => {
                const req = child.val();
                container.innerHTML += `<div style="background:#12131a; padding:10px; border-bottom:1px solid #2d2f3d;">
                    User: ${req.email} | Amt: ${req.amount} <button onclick="database.ref('requests/withdrawals/${child.key}').remove()">Done</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
