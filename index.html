<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2K Tournament</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #171821; color: #fff; font-family: sans-serif; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .btn-join { background: #ff4e50; color: #fff; padding: 10px; width: 100%; border: none; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #21222d; display: flex; justify-content: space-around; padding: 10px 0; }
    </style>
</head>
<body>

    <div id="playSection" class="content-section active">
        <h2>Matches</h2>
        <div id="userMatchList"></div>
    </div>

    <div id="walletSection" class="content-section">
        <h2>ওয়ালেট</h2>
        <button id="depositBtn" onclick="toggleDepositForm()" class="btn-join">ডিপোজিট করতে ক্লিক করুন</button>
        <div id="depositForm" style="display:none; margin-top:15px; background:#21222d; padding:15px; border-radius:12px;">
            <p>বিকাশ: <span id="bkashNum">লোড হচ্ছে...</span></p>
            <p>নগদ: <span id="nagadNum">লোড হচ্ছে...</span></p>
            <input type="number" id="depAmount" placeholder="টাকা" style="width:100%; padding:5px; margin:5px 0;">
            <input type="text" id="depTnx" placeholder="ট্রানজেকশন আইডি" style="width:100%; padding:5px; margin:5px 0;">
            <button class="btn-join" onclick="submitDeposit()">কনফার্ম</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="switchTab('playSection', this)">Play</button>
        <button onclick="switchTab('walletSection', this)">Wallet</button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoWus33bLMhSNz4rG7G9QNqYqvq2obMs8",
            authDomain: "b2k-tournament-aa8a3.firebaseapp.com",
            databaseURL: "https://b2k-tournament-aa8a3-default-rtdb.firebaseio.com",
            projectId: "b2k-tournament-aa8a3",
            storageBucket: "b2k-tournament-aa8a3.firebasestorage.app",
            messagingSenderId: "439255320420",
            appId: "1:439255320420:web:1d4fd7f331484c8e651c71"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function switchTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDepositForm() {
            const form = document.getElementById('depositForm');
            form.style.display = (form.style.display === 'none') ? 'block' : 'none';
        }

        database.ref('app_settings/payment_methods').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('bkashNum').innerText = data.bkash || "সেট নেই";
                document.getElementById('nagadNum').innerText = data.nagad || "সেট নেই";
            }
        });

        function submitDeposit() {
            const amt = document.getElementById('depAmount').value;
            const tnx = document.getElementById('depTnx').value;
            if(!amt || !tnx) return alert("সব ঘর পূরণ করুন!");
            database.ref('requests/deposits').push({ amount: amt, tid: tnx, status: 'pending' })
            .then(() => alert("রিকোয়েস্ট পাঠানো হয়েছে!"));
        }
    </script>
</body>
</html>
