<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2K Tournament - Premium App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #171821; color: #fff; padding-bottom: 80px; }
        #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top:0; left:0; width:100%; height:100%; background:#171821; z-index: 9999; padding: 20px; }
        .auth-container { width: 100%; max-width: 320px; background: #21222d; padding: 25px; border-radius: 16px; border: 1px solid #2f3042; }
        .app-header { background: #21222d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3042; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .section-title { font-size: 16px; margin: 15px 0; border-left: 4px solid #ff4e50; padding-left: 8px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #21222d; border-top: 1px solid #2f3042; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #7e809a; cursor: pointer; border: none; background: none; font-size: 12px; }
        .nav-item.active { color: #ff4e50; }
        .btn-join { background: #ff4e50; color: #fff; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #171821; border: 1px solid #2f3042; color: #fff; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color: #ff4e50; margin-bottom: 20px;">B2K TOURNAMENT</h1>
        <div class="auth-container">
            <input type="email" id="authEmail" placeholder="Email"><br>
            <input type="password" id="authPassword" placeholder="Password"><br>
            <button class="btn-join" onclick="handleAuthSubmit()">লগইন করুন</button>
        </div>
    </div>

    <div class="app-header">
        <div style="color:#ff4e50; font-weight:bold;">B2K TOURNAMENT</div>
        <div class="user-balance">৳<span id="userBalance">0</span></div>
    </div>

    <div id="noticeBoard" style="background:#21222d; padding:15px; margin: 15px; border-radius:15px; border: 1px solid #ff4e50; display: flex; align-items: center; gap: 10px;">
        <img id="noticeThumbnail" src="https://via.placeholder.com/60" style="width: 60px; height: 60px; border-radius: 8px; border: 1px solid #ff4e50;">
        <div>
            <h3 style="color:#ff4e50; font-size: 12px;">লেটেস্ট আপডেট</h3>
            <div id="noticeText" style="font-size: 13px; margin-top:5px;">লোড হচ্ছে...</div>
        </div>
    </div>

    <div id="playSection" class="content-section active">
        <h2 class="section-title">Matches</h2>
        <div class="match-grid" id="userMatchList"></div>
    </div>

    <div id="leaderboardSection" class="content-section">
        <h2 class="section-title">Rankings</h2>
        <div id="leaderboardList" style="background:#21222d; padding:15px; border-radius:15px; border: 1px solid #2f3042;"></div>
    </div>

    <div id="profileSection" class="content-section">
        <h2 class="section-title">Profile</h2>
        <div style="background:#21222d; padding:20px; border-radius:15px; border: 1px solid #2f3042;">
            <p>ব্যালেন্স: <b id="userBalanceText" style="color:#ff4e50;">০</b> টাকা</p>
            <input type="number" id="depAmount" placeholder="ডিপোজিট অ্যামাউন্ট">
            <button class="btn-join" onclick="requestDeposit()">ডিপোজিট রিকোয়েস্ট</button>
            <br><br>
            <input type="number" id="withAmount" placeholder="উইথড্র (মিনিমাম ১০০)">
            <input type="text" id="withNumber" placeholder="বিকাশ/নগদ নম্বর">
            <button class="btn-join" style="background:#e67e22;" onclick="requestWithdraw()">উইথড্র রিকোয়েস্ট</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('playSection', this)"><i class="fa-solid fa-gamepad"></i><span>Play</span></button>
        <button class="nav-item" onclick="switchTab('leaderboardSection', this)"><i class="fa-solid fa-trophy"></i><span>Rank</span></button>
        <button class="nav-item" onclick="switchTab('profileSection', this)"><i class="fa-solid fa-user"></i><span>Profile</span></button>
    </nav>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        function switchTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // Login
        function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPassword').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("লগইন ব্যর্থ!"));
        }

        // Load Notice
        database.ref('app_settings/notice').on('value', s => {
            const d = s.val();
            if(d) { 
                document.getElementById('noticeText').innerText = d.text; 
                document.getElementById('noticeThumbnail').src = d.image; 
            }
        });

        // Load Leaderboard
        database.ref('leaderboard').orderByChild('points').limitToLast(5).on('value', s => {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "";
            s.forEach(c => { const u = c.val(); list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #2f3042;">${u.name} - ${u.points} pts</div>`; });
        });

        // Wallet Updates
        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('authScreen').style.display = 'none';
                database.ref('users/' + u.uid).on('value', s => {
                    const b = s.val() ? s.val().balance : 0;
                    document.getElementById('userBalance').innerText = b;
                    document.getElementById('userBalanceText').innerText = b;
                });
            }
        });

        // Deposit & Withdraw
        function requestDeposit() {
            const amt = document.getElementById('depAmount').value;
            database.ref('requests/deposits').push({ email: auth.currentUser.email, amount: amt });
            alert("ডিপোজিট রিকোয়েস্ট সফল!");
        }

        function requestWithdraw() {
            const amt = parseInt(document.getElementById('withAmount').value);
            if(amt < 100) return alert("মিনিমাম ১০০ টাকা!");
            database.ref('requests/withdrawals').push({ email: auth.currentUser.email, amount: amt, number: document.getElementById('withNumber').value });
            alert("উইথড্র রিকোয়েস্ট সফল!");
        }
    </script>
</body>
</html>
