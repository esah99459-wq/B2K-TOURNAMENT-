<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2K Tournament - Premium App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #171821; color: #fff; padding-bottom: 80px; }
        #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top:0; left:0; width:100%; height:100%; background:#171821; z-index: 9999; padding: 20px; }
        .auth-container { width: 100%; max-width: 320px; background: #21222d; padding: 25px; border-radius: 16px; border: 1px solid #2f3042; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .auth-toggle { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #2f3042; padding-bottom: 10px; }
        .toggle-btn { background: none; border: none; color: #7e809a; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .toggle-btn.active { color: #ff4e50; border-bottom: 3px solid #ff4e50; padding-bottom: 8px; }
        .app-header { background: #21222d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3042; position: sticky; top: 0; z-index: 100; }
        .logo-text { font-size: 18px; font-weight: bold; color: #ff4e50; letter-spacing: 1px; }
        .user-balance { background: #ff4e501a; color: #ff4e50; border: 1px solid #ff4e5033; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .section-title { font-size: 16px; color: #fff; margin-bottom: 15px; font-weight: bold; border-left: 4px solid #ff4e50; padding-left: 8px; text-transform: uppercase; }
        .match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .match-card { background: #21222d; border-radius: 14px; overflow: hidden; border: 1px solid #2f3042; }
        .btn-join { background: #ff4e50; color: #fff; border: none; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px;}
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #21222d; border-top: 1px solid #2f3042; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #7e809a; cursor: pointer; border: none; background: none; font-size: 12px; }
        .nav-item.active { color: #ff4e50; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #21222d; padding: 20px; border-radius: 16px; width: 100%; max-width: 340px; border: 1px solid #2f3042; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #171821; border: 1px solid #2f3042; color: #fff; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color: #ff4e50; margin-bottom: 20px;">B2K TOURNAMENT</h1>
        <div class="auth-container">
            <div class="auth-toggle">
                <button id="toggleLogin" class="toggle-btn active" onclick="switchAuthMode('login')">লগইন</button>
                <button id="toggleRegister" class="toggle-btn" onclick="switchAuthMode('register')">সাইন-আপ</button>
            </div>
            <div id="nameField" style="display: none;"><input type="text" id="authName" placeholder="Name"></div>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <button id="authSubmitBtn" class="btn-join" onclick="handleAuthSubmit()">লগইন করুন</button>
        </div>
    </div>

    <div class="app-header">
        <div><div style="font-size: 11px;">স্বাগতম, User</div><div class="logo-text">B2K TOURNAMENT</div></div>
        <div class="user-balance">৳<span id="userBalance">0</span></div>
    </div>

    <div id="playSection" class="content-section active">
        <h2 class="section-title">Matches</h2>
        <div class="match-grid" id="userMatchList"></div>
    </div>

    <div id="profileSection" class="content-section">
        <h2 class="section-title">Profile & Wallet</h2>
        <div style="background:#21222d; padding:20px; border-radius:15px; border: 1px solid #2f3042;">
            <p>ব্যালেন্স: <b id="userBalanceText" style="color:#ff4e50;">০</b> টাকা</p>
            <input type="number" id="depAmount" placeholder="ডিপোজিট অ্যামাউন্ট">
            <button class="btn-join" onclick="requestDeposit()">ডিপোজিট রিকোয়েস্ট</button>
            <input type="number" id="withAmount" placeholder="উইথড্র (মিনিমাম ১০০)">
            <input type="text" id="withNumber" placeholder="বিকাশ/নগদ নম্বর">
            <button class="btn-join" style="background:#e67e22;" onclick="requestWithdraw()">উইথড্র রিকোয়েস্ট</button>
            <button class="btn-join" style="background:#3498db;" onclick="generateReferral()">রেফারেল কোড</button>
            <button class="btn-join" style="background:#2ecc71;" onclick="sendSupportTicket()">সাপোর্ট টিকিট</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('playSection', this)"><i class="fa-solid fa-gamepad"></i><span>Play</span></button>
        <button class="nav-item" onclick="switchTab('profileSection', this)"><i class="fa-solid fa-user"></i><span>Profile</span></button>
    </nav>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        function switchTab(sectionId, element) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');
        }

        // অটোমেটিক জয়েনিং ও ব্যালেন্স কাটা
        function joinMatch(key, fee) {
            const uid = auth.currentUser.uid;
            database.ref('users/' + uid + '/balance').once('value', s => {
                let bal = s.val() || 0;
                if (bal >= fee) {
                    database.ref('users/' + uid + '/balance').set(bal - fee);
                    database.ref('matches/' + key + '/joined_players').push({ uid: uid });
                    alert("সফলভাবে জয়েন করেছেন!");
                } else { alert("দুঃখিত, ব্যালেন্স কম!"); }
            });
        }

        function requestWithdraw() {
            const amount = parseInt(document.getElementById('withAmount').value);
            if (amount < 100) { alert("উইথড্র করতে সর্বনিম্ন ১০০ টাকা লাগবে!"); return; }
            database.ref('requests/withdrawals').push({ email: auth.currentUser.email, uid: auth.currentUser.uid, amount: amount, number: document.getElementById('withNumber').value });
            alert("উইথড্র রিকোয়েস্ট সফল!");
        }

        function generateReferral() { alert("আপনার রেফারেল কোড: REF" + auth.currentUser.uid.substring(0, 6)); }
        function sendSupportTicket() { const msg = prompt("আপনার সমস্যাটি লিখুন:"); if(msg) database.ref('support_tickets').push({ uid: auth.currentUser.uid, msg: msg }); }
        
        function requestDeposit() {
            const amount = document.getElementById('depAmount').value;
            database.ref('requests/deposits').push({ email: auth.currentUser.email, uid: auth.currentUser.uid, amount: amount });
            alert("ডিপোজিট রিকোয়েস্ট সফল!");
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                database.ref('users/' + user.uid).on('value', s => {
                    const bal = s.val() ? s.val().balance : 0;
                    document.getElementById('userBalance').innerText = bal;
                    document.getElementById('userBalanceText').innerText = bal;
                });
            } else { document.getElementById('authScreen').style.display = 'flex'; }
        });
    </script>
</body>
</html>
