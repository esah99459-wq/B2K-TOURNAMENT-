<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2K Tournament - Premium App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #171821; color: #fff; padding-bottom: 80px; }
        #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top:0; left:0; width:100%; height:100%; background:#171821; z-index: 9999; padding: 20px; }
        .auth-container { width: 100%; max-width: 320px; background: #21222d; padding: 25px; border-radius: 16px; border: 1px solid #2f3042; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .auth-toggle { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #2f3042; padding-bottom: 10px; }
        .toggle-btn { background: none; border: none; color: #7e809a; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .toggle-btn.active { color: #ff4e50; border-bottom: 3px solid #ff4e50; padding-bottom: 8px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2f3042; background: #171821; color: white; outline: none; }
        input:focus { border-color: #ff4e50; }
        .app-header { background: #21222d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3042; position: sticky; top: 0; z-index: 100; }
        .logo-text { font-size: 18px; font-weight: bold; color: #ff4e50; letter-spacing: 1px; }
        .user-balance { background: #ff4e501a; color: #ff4e50; border: 1px solid #ff4e5033; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .slider-container { width: 92%; margin: 15px auto 10px auto; height: 160px; border-radius: 14px; overflow: hidden; position: relative; border: 1px solid #2f3042; }
        .slider-img { width: 100%; height: 100%; object-fit: cover; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .section-title { font-size: 16px; color: #fff; margin-bottom: 15px; font-weight: bold; border-left: 4px solid #ff4e50; padding-left: 8px; text-transform: uppercase; }
        .match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .match-card { background: #21222d; border-radius: 14px; overflow: hidden; border: 1px solid #2f3042; cursor: pointer; }
        .match-thumb-box { width: 100%; height: 105px; background: #2a2b36; position: relative; }
        .match-thumb { width: 100%; height: 100%; object-fit: cover; }
        .fee-badge { position: absolute; top: 8px; right: 8px; background: #ff4e50; color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .match-info { padding: 10px; }
        .match-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-join { background: #ff4e50; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-logout { background: #444; color: #fff; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 20px;}
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #21222d; border-top: 1px solid #2f3042; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #7e809a; cursor: pointer; border: none; background: none; font-size: 12px; }
        .nav-item.active { color: #ff4e50; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h1 style="color: #ff4e50; margin-bottom: 20px;">B2K TOURNAMENT</h1>
        <div class="auth-container">
            <div class="auth-toggle">
                <button id="toggleLogin" class="toggle-btn active" onclick="switchAuthMode('login')">লগইন</button>
                <button id="toggleRegister" class="toggle-btn" onclick="switchAuthMode('register')">সাইন-আপ</button>
            </div>
            <div id="nameField" style="display: none;"><input type="text" id="authName" placeholder="আপনার নাম"></div>
            <input type="email" id="authEmail" placeholder="ইমেইল এড্রেস">
            <input type="password" id="authPassword" placeholder="পাসওয়ার্ড">
            <button id="authSubmitBtn" class="btn-join" onclick="handleAuthSubmit()">লগইন করুন</button>
        </div>
    </div>

    <div class="app-header">
        <div><div style="font-size: 11px;">স্বাগতম, <span id="userName">...</span></div><div class="logo-text">B2K TOURNAMENT</div></div>
        <div class="user-balance">৳<span id="userBalance">0</span></div>
    </div>

    <div id="playSection" class="content-section active">
        <div class="slider-container"><img class="slider-img" src="https://img.freepik.com/premium-photo/gaming-banner-background-with-abstract-elements_1253213-40093.jpg"></div>
        <h2 class="section-title" style="margin-top: 20px;">Matches</h2>
        <div class="match-grid" id="userMatchList"></div>
    </div>

    <div id="walletSection" class="content-section">
        <h2 class="section-title">ওয়ালেট</h2>
        <div style="background: #21222d; padding: 20px; border-radius: 12px; border: 1px solid #2f3042;">
            <h3 style="margin-bottom:10px;">ডিপোজিট করুন</h3>
            <input type="number" id="depAmount" placeholder="পরিমাণ (টাকা)">
            <input type="text" id="depTnx" placeholder="ট্রানজেকশন আইডি">
            <button class="btn-join" onclick="submitDeposit()">ডিপোজিট রিকোয়েস্ট পাঠান</button>

            <h3 style="margin-top:30px; margin-bottom:10px;">উইথড্র করুন</h3>
            <input type="text" id="withMethod" placeholder="পেমেন্ট মেথড (বিকাশ/নগদ)">
            <input type="text" id="withNumber" placeholder="আপনার নাম্বার">
            <input type="number" id="withAmount" placeholder="পরিমাণ (টাকা)">
            <button class="btn-join" style="background:#ffbc00; color:#000;" onclick="submitWithdraw()">উইথড্র রিকোয়েস্ট পাঠান</button>
        </div>
    </div>

    <div id="profileSection" class="content-section">
        <h2 class="section-title">প্রোফাইল</h2>
        <div style="background: #21222d; padding: 20px; border-radius: 12px; border: 1px solid #2f3042;">
            <p><strong>নাম:</strong> <span id="profileName">...</span></p>
            <p><strong>ইমেইল:</strong> <span id="profileEmail">...</span></p>
            <button class="btn-logout" onclick="auth.signOut().then(() => window.location.reload())">লগআউট</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('playSection', this)"><i class="fa-solid fa-gamepad"></i><br>Play</button>
        <button class="nav-item" onclick="switchTab('walletSection', this)"><i class="fa-solid fa-wallet"></i><br>Wallet</button>
        <button class="nav-item" onclick="switchTab('profileSection', this)"><i class="fa-solid fa-user"></i><br>Profile</button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAoWus33bLMhSNz4rG7G9QNqYqvq2obMs8",
          authDomain: "b2k-tournament-aa8a3.firebaseapp.com",
          databaseURL: "https://b2k-tournament-aa8a3-default-rtdb.firebaseio.com",
          projectId: "b2k-tournament-aa8a3",
          storageBucket: "b2k-tournament-aa8a3.firebasestorage.app",
          messagingSenderId: "439255320420",
          appId: "1:439255320420:web:1d4fd7f331484c8e651c71"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        let currentUserUid = null;
        let currentBalance = 0;

        function switchTab(sectionId, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function switchAuthMode(m) {
            document.getElementById('nameField').style.display = m === 'register' ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = m === 'register' ? 'নতুন একাউন্ট' : 'লগইন করুন';
        }

        function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const isReg = document.getElementById('nameField').style.display === 'block';
            if(isReg) {
                auth.createUserWithEmailAndPassword(email, password).then(res => database.ref('users/' + res.user.uid).set({ name: document.getElementById('authName').value, balance: 0 }));
            } else {
                auth.signInWithEmailAndPassword(email, password).catch(e => alert("লগইন ভুল!"));
            }
        }

        // নতুন ডিপোজিট ফাংশন
        function submitDeposit() {
            const amt = document.getElementById('depAmount').value;
            const tnx = document.getElementById('depTnx').value;
            if(!amt || !tnx) return alert("সব ঘর পূরণ করুন");
            database.ref('requests/deposits').push({ 
                uid: currentUserUid, 
                amount: Number(amt), 
                tid: tnx, 
                status: 'pending' 
            }).then(() => alert("ডিপোজিট রিকোয়েস্ট পাঠানো হয়েছে!"));
        }

        // নতুন উইথড্র ফাংশন
        function submitWithdraw() {
            const m = document.getElementById('withMethod').value;
            const n = document.getElementById('withNumber').value;
            const a = document.getElementById('withAmount').value;
            if(!m || !n || !a) return alert("সব ঘর পূরণ করুন");
            database.ref('requests/withdrawals').push({ 
                uid: currentUserUid, 
                method: m, 
                number: n, 
                amount: Number(a), 
                status: 'pending' 
            }).then(() => alert("উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!"));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('authScreen').style.display = 'none';
                database.ref('users/' + user.uid).on('value', s => {
                    const data = s.val();
                    if(data) {
                        currentBalance = data.balance || 0;
                        document.getElementById('userName').innerText = data.name;
                        document.getElementById('profileName').innerText = data.name;
                        document.getElementById('userBalance').innerText = currentBalance;
                        document.getElementById('profileEmail').innerText = user.email;
                    }
                });
                database.ref('matches').on('value', s => {
                    const cont = document.getElementById('userMatchList');
                    cont.innerHTML = "";
                    s.forEach(c => {
                        const m = c.val();
                        cont.innerHTML += `<div class="match-card"><div class="match-thumb-box"><span class="fee-badge">৳${m.fee}</span></div><div class="match-info">${m.name}</div></div>`;
                    });
                });
            }
        });
    </script>
</body>
</html>
