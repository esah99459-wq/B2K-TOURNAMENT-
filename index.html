<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2K Tournament - Premium App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #171821; color: #fff; padding-bottom: 80px; }
        #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top:0; left:0; width:100%; height:100%; background:#171821; z-index: 9999; padding: 20px; }
        .auth-container { width: 100%; max-width: 320px; background: #21222d; padding: 25px; border-radius: 16px; border: 1px solid #2f3042; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .auth-toggle { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #2f3042; padding-bottom: 10px; }
        .toggle-btn { background: none; border: none; color: #7e809a; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .toggle-btn.active { color: #ff4e50; border-bottom: 3px solid #ff4e50; padding-bottom: 8px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2f3042; background: #171821; color: white; outline: none; }
        .app-header { background: #21222d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3042; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .section-title { font-size: 16px; color: #fff; margin-bottom: 15px; font-weight: bold; border-left: 4px solid #ff4e50; padding-left: 8px; }
        .match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .match-card { background: #21222d; border-radius: 14px; border: 1px solid #2f3042; overflow: hidden; }
        .fee-badge { background: #ff4e50; padding: 3px 8px; border-radius: 6px; font-size: 11px; float: right; margin: 5px; }
        .btn-join { background: #ff4e50; color: #fff; border: none; padding: 10px; width: 100%; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #21222d; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #7e809a; cursor: pointer; text-align: center; font-size: 12px; border:none; background:none; }
        .nav-item.active { color: #ff4e50; }
    </style>
</head>
<body>
    <div id="noticeSlider" style="width: 100%; height: 180px; overflow: hidden; position: relative; background: #21222d; margin-bottom: 15px; border-radius: 12px; border: 1px solid #2f3042;">
    <div id="noticeContent" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <p>নোটিশ লোড হচ্ছে...</p>
    </div>
</div>
;

    <div id="authScreen">
        <h1 style="color: #ff4e50; margin-bottom: 20px;">B2K TOURNAMENT</h1>
        <div class="auth-container">
            <div class="auth-toggle">
                <button id="toggleLogin" class="toggle-btn active" onclick="switchAuthMode('login')">লগইন</button>
                <button id="toggleRegister" class="toggle-btn" onclick="switchAuthMode('register')">সাইন-আপ</button>
            </div>
            <div id="nameField" style="display: none;"><input type="text" id="authName" placeholder="আপনার নাম"></div>
            <input type="email" id="authEmail" placeholder="ইমেইল এড্রেস">
            <input type="password" id="authPassword" placeholder="পাসওয়ার্ড">
            <button id="authSubmitBtn" class="btn-join" onclick="handleAuthSubmit()">লগইন করুন</button>
        </div>
    </div>

    <div class="app-header">
        <div><div style="font-size: 11px;">স্বাগতম, <span id="userName">...</span></div><div style="color:#ff4e50; font-weight:bold;">B2K TOURNAMENT</div></div>
        <div style="background:#ff4e501a; color:#ff4e50; padding:6px 12px; border-radius:20px;">৳<span id="userBalance">0</span></div>
    </div>

    <div id="playSection" class="content-section active">
        <h2 class="section-title">Matches</h2>
        <div class="match-grid" id="userMatchList"></div>
    </div>

    <div id="rulesSection" class="content-section">
        <h2 class="section-title">খেলার নিয়মাবলী</h2>
        <div id="displayRules" style="background: #21222d; padding: 20px; border-radius: 12px; border: 1px solid #2f3042;">লোডিং...</div>
    </div>

    <div id="walletSection" class="content-section">
        <h2 class="section-title">ওয়ালেট</h2>
        <input type="number" id="depAmount" placeholder="পরিমাণ (টাকা)">
        <input type="text" id="depTnx" placeholder="ট্রানজেকশন আইডি">
        <button class="btn-join" onclick="submitDeposit()">ডিপোজিট রিকোয়েস্ট</button>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('playSection', this)"><i class="fa-solid fa-gamepad"></i><br>Play</button>
        <button class="nav-item" onclick="switchTab('rulesSection', this)"><i class="fa-solid fa-book"></i><br>Rules</button>
        <button class="nav-item" onclick="switchTab('walletSection', this)"><i class="fa-solid fa-wallet"></i><br>Wallet</button>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAoWus33bLMhSNz4rG7G9QNqYqvq2obMs8",
          authDomain: "b2k-tournament-aa8a3.firebaseapp.com",
          databaseURL: "https://b2k-tournament-aa8a3-default-rtdb.firebaseio.com",
          projectId: "b2k-tournament-aa8a3",
          storageBucket: "b2k-tournament-aa8a3.firebasestorage.app",
          messagingSenderId: "439255320420",
          appId: "1:439255320420:web:1d4fd7f331484c8e651c71"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        let currentUserUid = null;
        let currentBalance = 0;

        function switchTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function switchAuthMode(m) {
            document.getElementById('nameField').style.display = m === 'register' ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = m === 'register' ? 'নতুন একাউন্ট' : 'লগইন করুন';
        }

        function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const isReg = document.getElementById('nameField').style.display === 'block';
            if(isReg) {
                auth.createUserWithEmailAndPassword(email, password).then(res => database.ref('users/' + res.user.uid).set({ name: document.getElementById('authName').value, balance: 0 }));
            } else {
                auth.signInWithEmailAndPassword(email, password).catch(e => alert("লগইন ভুল!"));
            }
        }

        function joinMatch(mid, name, fee) {
            if (currentBalance < fee) return alert("ব্যালেন্স কম!");
            database.ref('users/' + currentUserUid + '/balance').set(currentBalance - fee);
            database.ref('matches/' + mid + '/participants/' + currentUserUid).set({joinedAt: new Date().toLocaleTimeString()});
            alert(name + " ম্যাচে জয়েন করেছেন!");
        }

        function submitDeposit() {
            database.ref('requests/deposits').push({ uid: currentUserUid, amount: Number(document.getElementById('depAmount').value), tid: document.getElementById('depTnx').value, status: 'pending' });
            alert("রিকোয়েস্ট পাঠানো হয়েছে!");
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('authScreen').style.display = 'none';
                database.ref('users/' + user.uid).on('value', s => {
                    const data = s.val();
                    currentBalance = data.balance || 0;
                    document.getElementById('userName').innerText = data.name;
                    document.getElementById('userBalance').innerText = currentBalance;
                });
                
                // শুধুমাত্র একটি ম্যাচ লিস্ট লিসেনার
                database.ref('matches').on('value', s => {
                    const cont = document.getElementById('userMatchList');
                    cont.innerHTML = "";
                    s.forEach(c => {
                        const m = c.val();
                        cont.innerHTML += `<div class="match-card"><span class="fee-badge">৳${m.fee}</span><div style="padding:10px"><h4>${m.name}</h4><p>সময়: ${m.time}</p><button class="btn-join" onclick="joinMatch('${c.key}', '${m.name}', ${m.fee})">জয়েন করুন</button></div></div>`;
                    });
                });

                // নিয়মাবলী
                database.ref('app_settings/rules').on('value', s => {
                    document.getElementById('displayRules').innerText = s.val() || "এখনো নিয়ম নেই।";
                });
            }
        });
        database.ref('notices').on('value', (snapshot) => {
    const slider = document.getElementById('noticeContent');
    const n = snapshot.val(); // এখানে লুপের দরকার নেই, কারণ আপনি 'set' ব্যবহার করেছেন

    if (n) {
        // যদি ডাটা থাকে, তবে সরাসরি দেখাবে
        slider.innerHTML = `
            <div class="notice-item" style="padding: 15px; border: 1px solid #ff4e50; margin: 10px; border-radius: 8px;">
                <h3 style="color: #ff4e50;">${n.title}</h3>
                <p style="color: #ccc; margin: 10px 0;">${n.description}</p>
                ${n.video_link ? `<a href="${n.video_link}" target="_blank" style="color: #3498db; text-decoration: none;">▶ ভিডিওটি দেখুন</a>` : ""}
            </div>`;
    } else {
        // ডাটা না থাকলে
        slider.innerHTML = "<p style='padding: 20px; text-align: center;'>বর্তমানে কোনো নোটিশ নেই।</p>";
    }
});



    
    </script>
</body>
</html>
